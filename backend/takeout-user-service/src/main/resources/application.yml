server:
  port: 8101

spring:
  application:
    name: takeout-user-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/takeout_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

takeout:
  jwt:
    secret: ${TAKEOUT_JWT_SECRET:takeout-demo-jwt-secret}
    expire-hours: ${TAKEOUT_JWT_EXPIRE_HOURS:72}

amap:
  web-service-key: ${AMAP_WEB_SERVICE_KEY:}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    region: ${ALIYUN_OSS_REGION:cn-beijing}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${ALIYUN_OSS_BUCKET:}
    public-domain: ${ALIYUN_OSS_PUBLIC_DOMAIN:}
    avatar-prefix: ${ALIYUN_OSS_AVATAR_PREFIX:takeout/avatar/}
    merchant-prefix: ${ALIYUN_OSS_MERCHANT_PREFIX:takeout/merchant/}
    menu-prefix: ${ALIYUN_OSS_MENU_PREFIX:takeout/menu/}
